<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cloud-panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="frame">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-dot" id="statusDot"></span>
        <span class="brand-name">cloud-panel</span>
      </div>
      <nav class="nav">
        <a class="nav-item active" href="#">Overview</a>
        <a class="nav-item" href="#">Services</a>
        <a class="nav-item" href="#">Logs</a>
        <a class="nav-item" href="#">Settings</a>
      </nav>
      <div class="sidebar-foot">
        <span class="mono muted" id="clock">--:--:--</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Overview</h1>
          <p class="muted">Service status, straight from Postgres.</p>
        </div>
        <div class="conn-pill" id="connPill">
          <span class="dot" id="connDot"></span>
          <span class="mono" id="connText">checking…</span>
        </div>
      </header>

      <section class="stat-grid">
        <div class="card stat">
          <span class="stat-label">db latency</span>
          <span class="stat-value mono" id="latencyValue">—</span>
        </div>
        <div class="card stat">
          <span class="stat-label">services tracked</span>
          <span class="stat-value mono" id="countValue">—</span>
        </div>
        <div class="card stat">
          <span class="stat-label">last check</span>
          <span class="stat-value mono" id="lastCheckValue">—</span>
        </div>
      </section>

      <section class="card panel">
        <div class="panel-head">
          <h2>Services</h2>
          <form id="addForm" class="add-form">
            <input id="newName" type="text" placeholder="service name" required />
            <select id="newStatus">
              <option value="up">up</option>
              <option value="degraded">degraded</option>
              <option value="down">down</option>
              <option value="unknown" selected>unknown</option>
            </select>
            <button type="submit">Add</button>
          </form>
        </div>
        <table class="service-table">
          <thead>
            <tr>
              <th>id</th>
              <th>name</th>
              <th>status</th>
              <th>updated</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="serviceRows">
            <tr><td colspan="5" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
